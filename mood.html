<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mood Entry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-mood">
    <h1>Record Your Mood</h1>
    <p>Track your mood and stress levels daily</p>

    <form id="moodForm">

        <div class="form-group">
            <label for="intensity">Mood Intensity (1-10):</label>
            <input type="number" id="intensity" min="1" max="10" required>
        </div>

        <div class="form-group">
            <label for="stress">Stress Level (1-10):</label>
            <input type="number" id="stress" min="1" max="10" required>
        </div>

        <div class="form-group">
            <label for="mood_level">Type of Mood:</label>
            <select id="mood_level" required>
                <option value="">--Select--</option>
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="stressed">Stressed</option>
                <option value="angry">Angry</option>
            </select>
        </div>

        <div class="form-group">
            <label for="note">Note:</label>
            <textarea id="note" rows="3" placeholder="Optional note..."></textarea>
        </div>

        <button type="submit">Save Mood</button>
    </form>

    <div class="link-text">
        <a href="home.html">Back to Home</a>
    </div>
</div>

</body>
</html>
